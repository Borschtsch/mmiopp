name: Coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  coverage:
    runs-on: windows-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: powershell

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Bootstrap coverage toolchain
        run: ./scripts/bootstrap.ps1 -InstallCMake -InstallArmToolchain -InstallQemu -InstallNinja

      - name: Run QEMU Cortex-R5 coverage workflow preset
        run: |
          .\scripts\run-ci-coverage.ps1 `
            -Preset "qemu-r5-coverage-test" `
            -BuildDir "build/qemu-r5-coverage" `
            -CoverageSource "the QEMU Cortex-R5 runtime suite"

      - name: Publish QEMU Cortex-R5 coverage test metrics
        if: always()
        run: |
          .\scripts\ci-test-metrics.ps1 `
            -Preset "qemu-r5-coverage-test" `
            -TestPreset "qemu-r5-coverage" `
            -BuildDir "build/qemu-r5-coverage" `
            -WorkflowDurationSeconds "$env:WORKFLOW_DURATION_SECONDS" `
            -WorkflowExitCode "$env:WORKFLOW_EXIT_CODE" `
            -WorkflowLogPath "$env:WORKFLOW_LOG_PATH"

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-r5-coverage
          path: |
            build/qemu-r5-coverage/ci-workflow.log
            build/qemu-r5-coverage/Testing/Temporary/LastTest.log
            build/qemu-r5-coverage/Testing/Temporary/CTestCostData.txt
            build/qemu-r5-coverage/ci-metrics.json
            build/qemu-r5-coverage/coverage/coverage-summary.json
            build/qemu-r5-coverage/coverage/coverage-summary.md
            build/qemu-r5-coverage/coverage/coverage-core.info
            build/qemu-r5-coverage/coverage/coverage-product.info
          if-no-files-found: ignore

      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: build/qemu-r5-coverage/coverage/coverage-core.info
          disable_search: true
          flags: core
          name: mmiocpp-core-coverage
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
