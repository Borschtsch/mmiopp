name: Coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  coverage:
    runs-on: windows-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: powershell

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Bootstrap Windows toolchain
        run: ./scripts/bootstrap.ps1

      - name: Run host coverage workflow preset
        run: |
          .\scripts\run-ci-coverage.ps1 `
            -Preset "host-coverage-test" `
            -BuildDir "build/host-coverage"

      - name: Publish host coverage test metrics
        if: always()
        run: |
          .\scripts\ci-test-metrics.ps1 `
            -Preset "host-coverage-test" `
            -TestPreset "host-coverage" `
            -BuildDir "build/host-coverage" `
            -WorkflowDurationSeconds "$env:WORKFLOW_DURATION_SECONDS" `
            -WorkflowExitCode "$env:WORKFLOW_EXIT_CODE" `
            -WorkflowLogPath "$env:WORKFLOW_LOG_PATH"

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: host-coverage
          path: |
            build/host-coverage/ci-workflow.log
            build/host-coverage/Testing/Temporary/LastTest.log
            build/host-coverage/Testing/Temporary/CTestCostData.txt
            build/host-coverage/ci-metrics.json
            build/host-coverage/coverage/coverage-summary.json
            build/host-coverage/coverage/coverage-summary.md
            build/host-coverage/coverage/coverage-core.info
            build/host-coverage/coverage/coverage-product.info
          if-no-files-found: ignore

      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: build/host-coverage/coverage/coverage-core.info
          flags: core
          name: mmiocpp-core-coverage
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}