name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  windows-presets:
    name: ${{ matrix.preset }}
    runs-on: windows-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        preset:
          - host-test
          - qemu-m3-test
          - qemu-r5-test

    defaults:
      run:
        shell: powershell

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Bootstrap Windows toolchain
        run: ./scripts/bootstrap.ps1

      - name: Run CMake workflow preset
        run: cmake --workflow --preset ${{ matrix.preset }}
