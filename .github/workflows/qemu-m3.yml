name: QEMU Cortex-M3

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  qemu-m3:
    runs-on: windows-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: powershell

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Bootstrap QEMU Cortex-M3 toolchain
        run: ./scripts/bootstrap.ps1 -InstallCMake -InstallArmToolchain -InstallQemu -InstallNinja

      - name: Run QEMU Cortex-M3 workflow preset
        run: |
          .\scripts\run-ci-workflow.ps1 `
            -Preset "qemu-m3-test" `
            -BuildDir "build/qemu-m3"

      - name: Publish QEMU Cortex-M3 test metrics
        if: always()
        run: |
          .\scripts\ci-test-metrics.ps1 `
            -Preset "qemu-m3-test" `
            -TestPreset "qemu-m3" `
            -BuildDir "build/qemu-m3" `
            -WorkflowDurationSeconds "$env:WORKFLOW_DURATION_SECONDS" `
            -WorkflowExitCode "$env:WORKFLOW_EXIT_CODE" `
            -WorkflowLogPath "$env:WORKFLOW_LOG_PATH"

      - name: Upload QEMU Cortex-M3 logs and metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-m3-metrics
          path: |
            build/qemu-m3/ci-workflow.log
            build/qemu-m3/Testing/Temporary/LastTest.log
            build/qemu-m3/Testing/Temporary/CTestCostData.txt
            build/qemu-m3/ci-metrics.json
          if-no-files-found: ignore